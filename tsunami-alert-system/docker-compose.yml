services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: tsunami_alert
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tsunami_alert"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/tsunami_alert
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  celery:
    build: ./backend
    # Do not use backend entrypoint (alembic) — only one migrator; avoid race with `backend`.
    entrypoint: ["celery", "-A", "app.celery_app", "worker", "-B", "--loglevel=info"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/tsunami_alert
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      # Omit VITE_API_BASE_URL in root .env so the browser uses same host as the SPA (e.g. 127.0.0.1:8000).
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata: {}
